name = "rem_ties"

[provenance]
r_version = "4.6.1"
survival_version = "3.8.6"
seed = 20260713
script = "test/fixtures/r/rem_ties.R"
date = "2026-07-13"
dataset = "simulated relational event sequence (8 actors, 90 events) observed on a coarse clock (resolution 0.03), which is what makes the ties; frozen below under input_*"
design = "counting-process Cox: one interval per distinct event time, all n(n-1) ordered dyads at risk in every interval, covariates frozen across each tie block"
model = "coxph(Surv(start, stop, is_event) ~ repetition + reciprocity + sender_activity, ties = breslow | efron)"

[tolerance]
# Both sides maximize the SAME Breslow (resp. Efron) partial likelihood on
# the SAME full risk set by Newton-Raphson: no Monte Carlo, no sampling,
# nothing may differ but floating-point summation order. Observed
# disagreement at the frozen values is < 1e-11 on every coefficient,
# standard error and log-likelihood.
default = 1e-8
# The inputs are echoed exactly; they are read, not compared.
input_time = 1e-12

