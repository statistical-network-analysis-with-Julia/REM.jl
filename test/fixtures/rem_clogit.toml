name = "rem_clogit"

[provenance]
r_version = "4.6.1"
survival_version = "3.8.6"
seed = 20260714
script = "test/fixtures/r/rem_clogit.R"
date = "2026-07-13"
dataset = "simulated relational event sequence (10 actors, 80 events); frozen below under input_*"
design = "full risk set: all n(n-1) = 90 ordered dyads per event, one stratum per event"

[tolerance]
# Both sides maximize the SAME exact conditional-logit likelihood on the
# SAME design by Newton-Raphson: there is no Monte Carlo and no sampling,
# so nothing here is allowed to differ except floating-point summation
# order. Observed disagreement at the frozen values is < 1e-13 on every
# coefficient and standard error. 1e-8 is that with five orders of
# margin, and is still tight enough that any real change in a statistic's
# definition, or in the estimator, fails the test.
default = 1e-8
# The inputs are echoed exactly; they are read, not compared.
input_time = 1e-12

